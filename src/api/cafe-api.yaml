openapi: 3.0.0
info:
  title: Cafe SaaS API
  version: 1.0.0

servers:
  - url: /api

paths:
  # =========================
  # AUTH APIs
  # =========================

  /auth/register:
    post:
      summary: Register user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name, password]
              properties:
                email:
                  type: string
                name:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [SUPER_ADMIN, ADMIN, STAFF]
      responses:
        201:
          description: User created

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login success

  /auth/user:
    get:
      summary: Get logged-in user
      tags: [Auth]
      responses:
        200:
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # =========================
  # CAFE APIs
  # =========================

  /cafe:
    post:
      summary: Create cafe
      tags: [Cafe]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        201:
          description: Cafe created

  # =========================
  # STAFF APIs
  # =========================

  /staff:
    post:
      summary: Add staff
      tags: [Staff]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        201:
          description: Staff added

    get:
      summary: Get staff list
      tags: [Staff]
      responses:
        200:
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  # =========================
  # MENU APIs
  # =========================

  /menu:
    post:
      summary: Create menu item
      tags: [Menu]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              required: [name, price]
              type: object
              properties:
                name:
                  type: string
                price:
                  type: string
                category:
                  type: string
                cafeId:
                  type: string
                imageUrl:
                  type: string
                  format: binary
      responses:
        201:
          description: Menu created

    get:
      summary: Get all menu items
      tags: [Menu]
      responses:
        200:
          description: Menu list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Menu"

  /menu/{id}:
    get:
      summary: Get menu by ID
      tags: [Menu]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Menu"

  /menu/{id}/{category}:
    get:
      summary: Get menu by ID and category
      tags: [Menu]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Filtered menu

  # =========================
  # ORDER APIs
  # =========================

  /orders:
    post:
      summary: Create order
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: [cafeId, tableNo, items]
              type: object
              properties:
                cafeId:
                  type: string
                tableNo:
                  type: integer
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/OrderItemInput"
      responses:
        201:
          description: Order created

    get:
      summary: Get all orders
      tags: [Orders]
      responses:
        200:
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      summary: Get order by ID
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

    patch:
      summary: Update order status
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PENDING, PREPARING, COMPLETED]
      responses:
        200:
          description: Order updated

# =========================
# COMPONENTS
# =========================

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [SUPER_ADMIN, ADMIN, STAFF]
        cafeId:
          type: string
          nullable: true

    Cafe:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    Menu:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        cafeId:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
        cafeId:
          type: string
        tableNo:
          type: integer
        status:
          type: string
          enum: [PENDING, PREPARING, COMPLETED]
        total:
          type: number
        createdAt:
          type: string

    OrderItemInput:
      type: object
      required: [menuId, quantity]
      properties:
        menuId:
          type: string
        quantity:
          type: integer
